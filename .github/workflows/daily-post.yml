name: Akdam Social Auto-Post

on:
  schedule:
    # Runs every day at 9:00 AM UTC (adjust to your preferred time)
    - cron: "0 9 * * *"
  workflow_dispatch: {}
    # ^ This lets you manually trigger a test run from the GitHub Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate and post content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          MASTODON_HANDLE: ${{ secrets.MASTODON_HANDLE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: python post.py
